<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goosport</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .titulo {
      text-align: center;
    }
    header {
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #00cfff;
      margin: 0;
    }

    .section {
      padding: 15px;
    }

    .button-main {
      display: block;
      width: 90%;
      margin: 10px auto;
      padding: 12px;
      background-color: #00cfff;
      color: #121619;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .match-card {
      background-color: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 15px;
      margin: 10px;
    }

    .match-card h3 {
      margin: 0;
      color: #00cfff;
    }

    .match-info {
      font-size: 0.9rem;
      margin: 4px 0;
    }

    .match-buttons {
      margin-top: 10px;
    }

    .match-buttons button {
      margin-right: 10px;
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .join-btn {
      background-color: #00cfff;
      color: black;
    }

    .joined {
      background-color: gold;
       color: black;
    }

    .view-btn {
      background-color: #444;
      color: white;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background-color: #1e2428;
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 400px;
    }

    input {
      width: 100%;
      margin: 5px 0;
      padding: 10px;
      border-radius: 6px;
      border: none;
    }
  </style>
</head>

<body>

<header>
  <h1>GOOSPORT</h1>
</header>

<section class="section">
  <button class="button-main" onclick="abrirModal()">➕ Crear partido</button>
</section>

<section class="section">
  <h2 class="titulo">📅 Próximos partidos</h2>
  <div id="matches-container"></div>
</section>

<!-- MODAL CREAR PARTIDO -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Crear partido</h3>
    
    <input type="password" id="clave" placeholder="Clave del partido">
    <input type="text" id="deporte" placeholder="Ej: Fútbol 7">
    <input type="text" id="ciudad" placeholder="Ciudad">
    <input type="text" id="hora" placeholder="Ej: Hoy 19:00">
    <input type="number" id="maxJugadores" placeholder="Jugadores máximos">

    <button class="button-main" onclick="crearPartido()">Crear</button>
    <button class="button-main" onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

<script>

let userName = localStorage.getItem("userName");

if (!userName) {
  userName = prompt("Introduce tu nombre");
  localStorage.setItem("userName", userName);
}

  let userId = localStorage.getItem("userId");

if (!userId) {
  userId = "user_" + Math.random().toString(36).substr(2, 9);
  localStorage.setItem("userId", userId);
}
  
  // 🔥 CONFIG FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyC4MzyFGaSfb2QFde2Up85lD-5UsayRCMY",
    authDomain: "betty-70d8b.firebaseapp.com",
    projectId: "betty-70d8b",
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const container = document.getElementById("matches-container");

  // 🔄 CARGAR PARTIDOS
function crearPartido() {
  const deporte = document.getElementById("deporte").value;
  const ciudad = document.getElementById("ciudad").value;
  const hora = document.getElementById("hora").value;
  const max = document.getElementById("maxJugadores").value;

  const clave = document.getElementById("clave").value;

  if (!clave) {
    alert("Introduce una clave");
    return;
  }

  // 🔒 VALIDACIÓN
  if (!deporte || !ciudad || !hora || !max) {
    alert("Rellena todos los campos");
    return;
  }

  if (isNaN(max)) {
    alert("Número de jugadores inválido");
    return;
  }

  console.log("Intentando crear partido...");

  db.collection("partidos").add({
    deporte: deporte,
    ciudad: ciudad,
    hora: hora,
    jugadores: [{ id: userId, nombre: userName }],
    jugadoresActuales: 1,
    jugadoresMax: parseInt(max),
    pagados: [],creador: {id: userId,nombre: userName},
    clave: clave
  })
  .then(() => {
    console.log("✅ PARTIDO CREADO");
    alert("Partido creado");
    cerrarModal();
    cargarPartidos();
  })
  .catch((error) => {
    console.error("❌ ERROR REAL:", error);
    alert("Error al crear partido");
  });
}
 
  // 🙋 APUNTARSE
  function apuntarse(id) {
  const ref = db.collection("partidos").doc(id);

  ref.get().then((doc) => {
    const data = doc.data();

    let jugadores = data.jugadores || [];

    // 🔒 Ya está dentro
    if (jugadores.some(j => j.id === userId)) {
       alert("Ya estás apuntado");
       return;
    }

    // 🚫 Partido lleno
    if (jugadores.length >= data.jugadoresMax) {
      alert("Partido lleno");
      return;
    }

    jugadores.push({ id: userId, nombre: userName });

    ref.update({
      jugadores: jugadores,
      jugadoresActuales: jugadores.length
    }).then(() => {
      cargarPartidos();
    });
  });
}

  function verPartido(id) {
  window.location.href = "partido.html?id=" + id;
}

  // 🪟 MODAL
  function abrirModal() {
    document.getElementById("modal").style.display = "flex";
  }

  function cerrarModal() {
    document.getElementById("modal").style.display = "none";
  }

  cargarPartidos();

  function cargarPartidos() {
  container.innerHTML = "";

  db.collection("partidos").get().then((querySnapshot) => {
    querySnapshot.forEach((doc) => {
      const data = doc.data();
      const esCreador = data.creador?.id === userId;
      const yaApuntado = data.jugadores?.some(j => j.id === userId);

      const card = `
       <div class="match-card">
          <h3>⚽ ${data.deporte}</h3>
          <p class="match-info">📍 ${data.ciudad}</p>
          <p class="match-info">🕒 ${data.hora}</p>
          <p class="match-info">👥 ${data.jugadoresActuales} / ${data.jugadoresMax}</p>
          <p class="match-info">💰 ${data.pagados?.length || 0} han pagado</p>

          <div class="match-buttons">

            <button 
              class="join-btn ${yaApuntado ? "joined" : ""}" 
              onclick="apuntarse('${doc.id}')"
              ${yaApuntado ? "disabled" : ""}
            >
              ${yaApuntado ? "Ya estás" : "Me apunto"}
            </button>

            <button class="view-btn" onclick="verPartido('${doc.id}')">
              Ver partido
            </button>

          </div>
        </div>
      `;

      container.innerHTML += card;
    });
  });
}

</script>

</body>
</html>
