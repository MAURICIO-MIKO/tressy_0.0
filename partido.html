<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <!-- 🔥 CLAVE PARA MÓVIL -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Detalle Partido</title>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      padding: 12px;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    h2 {
      text-align: center;
      color: #00cfff;
      margin-bottom: 15px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .top-info p {
      margin: 6px 0;
      font-size: 0.95rem;
    }

    .player {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 10px 0;
      padding: 12px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
    }

    .player span {
      font-size: 1rem;
    }

    button {
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #00cfff;
      color: black;
      font-weight: bold;
      font-size: 0.95rem;
    }

    .paid {
      color: lime;
      font-weight: bold;
    }

    .pending {
      color: orange;
    }

    /* 💻 Desktop */
    @media (min-width: 600px) {
      .player {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }

      button {
        width: auto;
      }
    }
  </style>
</head>

<body>

<h2>📋 Detalle del partido</h2>

<div id="info" class="card"></div>

<h2>👥 Jugadores</h2>
<div id="players"></div>

<script>
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "betty-70d8b.firebaseapp.com",
  projectId: "betty-70d8b",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 ID DESDE URL
const urlParams = new URLSearchParams(window.location.search);
const partidoId = urlParams.get("id");

// 👤 usuario
let userId = localStorage.getItem("userId");

// contenedores
const container = document.getElementById("players");
const infoBox = document.getElementById("info");

// 🔄 CARGAR PARTIDO
db.collection("partidos").doc(partidoId).get()
.then(doc => {

  if (!doc.exists) {
    container.innerHTML = "❌ Partido no encontrado";
    return;
  }

  const data = doc.data();

  const pagados = data.pagados || [];
  const esCreador = data.creador?.id === userId;

  // INFO
  infoBox.innerHTML = `
    <div class="top-info">
      <p>⚽ ${data.deporte}</p>
      <p>📍 ${data.lugar}</p>
      <p>🕒 ${data.hora}</p>
      <p>👥 ${data.jugadoresActuales} / ${data.jugadoresMax}</p>
      <p>💰 ${pagados.length} han pagado</p>
    </div>
  `;

  container.innerHTML = "";

  if (!data.jugadores || data.jugadores.length === 0) {
    container.innerHTML = "No hay jugadores";
    return;
  }

  data.jugadores.forEach(j => {

    const haPagado = Array.isArray(pagados) && pagados.includes(j.id);

    const div = document.createElement("div");
    div.className = "player";

    div.innerHTML = `
        <span>${j.nombre}</span>

        ${
            esCreador
            ? `
                ${
                haPagado
                    ? `<button onclick="togglePago('${j.id}', '${j.nombre}', true)">✔ PAGADO</button>`
                    : `<button onclick="togglePago('${j.id}', '${j.nombre}', false)">💰 NO HA PAGADO</button>`
                }

                ${
                j.id !== userId 
                    ? `<button style="background:red;color:white;" onclick="eliminarJugador('${j.id}', '${j.nombre}')">❌</button>`
                    : ""
                }
            `
            : haPagado
                ? `<span class="paid">✔ Pagado</span>`
                : `<span class="pending">⏳ Pendiente</span>`
        }
        `;

    container.appendChild(div);
  });

})
.catch(() => {
  container.innerHTML = "Error cargando datos";
});

function eliminarJugador(userIdToDelete, nombre) {
  const ref = db.collection("partidos").doc(partidoId);

  ref.get().then(doc => {
    const data = doc.data();

    // 🔐 pedir clave
    const claveInput = prompt("Introduce la clave para eliminar");

    if (claveInput !== data.clave) {
      alert("Clave incorrecta");
      return;
    }

    let jugadores = data.jugadores || [];
    let pagados = Array.isArray(data.pagados) ? data.pagados : [];

    // ❌ eliminar jugador
    jugadores = jugadores.filter(j => j.id !== userIdToDelete);

    // ❌ eliminar de pagados también
    pagados = pagados.filter(id => id !== userIdToDelete);

    ref.update({
      jugadores: jugadores,
      jugadoresActuales: jugadores.length,
      pagados: pagados
    }).then(() => {
        cargarPartido(); // o vuelve a renderizar sin recargar
        });
  });
}

// 💰 TOGGLE PAGO
function togglePago(userIdToPay, nombre, yaPagado) {
  const ref = db.collection("partidos").doc(partidoId);

  ref.get().then(doc => {
    const data = doc.data();

    const claveInput = prompt("Introduce la clave");

    if (claveInput !== data.clave) {
      alert("Clave incorrecta");
      return;
    }

    // 🔥 SIEMPRE ARRAY LIMPIO
    let pagados = Array.isArray(data.pagados) ? data.pagados : [];

    if (yaPagado) {
      // ❌ quitar pago
      pagados = pagados.filter(id => id !== userIdToPay);
    } else {
      // ✅ evitar duplicados
      if (!pagados.includes(userIdToPay)) {
        pagados.push(userIdToPay);
      }
    }

    // 🔥 eliminar posibles duplicados por seguridad
    pagados = [...new Set(pagados)];

    ref.update({ pagados }).then(() => location.reload());
  });
}
</script>

</body>
</html>
